@if (items().length > 0) {
  <h4 class="text-3xl text-center mb-5">Detalle de la factura</h4>
  <div class="overflow-x-auto">
    <table class="table">
      <thead>
        <tr>
          <th class="text-center">id</th>
          <th class="text-center">product</th>
          <th class="text-center">price</th>
          <th class="text-center">quantity</th>
          <th class="text-center">remove</th>
        </tr>
      </thead>
      <tbody>
        @for (item of items(); track $index) {
          <tr>
            <td class="text-center">{{ item.id }}</td>
            <td class="text-center">{{ item.product }}</td>
            <td class="text-center">{{ item.price }}</td>
            <td class="text-center">{{ item.quantity }}</td>
            <td class="text-center">
              <button class="btn btn-error btn-sm" (click)="onRemove(item.id)">Remove</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
} @else {
  <div role="alert" class="alert alert-error my-5">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-6 w-6 shrink-0 stroke-current"
      fill="none"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"
      />
    </svg>
    <span>No tiene items la factura!</span>
  </div>
}
